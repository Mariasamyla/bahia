<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site com Botão no Meio e Música</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: url('caida.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }
        .cauldron-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 0;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: black;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .cauldron-button:before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 140px;
            height: 70px;
            background-color: black;
            border-radius: 50%;
            transform: translateX(-50%);
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-fast {
            from { transform: rotate(0deg); }
            to { transform: rotate(720deg); }
        }
        @keyframes sparkle {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes fall {
            0% { top: -100px; opacity: 0; }
            50% { top: 50%; opacity: 1; }
            100% { top: 50%; opacity: 1; }
        }
        @keyframes exit {
            0% { top: 50%; opacity: 1; }
            100% { top: -100px; opacity: 0; }
        }
        @keyframes confetti {
            0% { transform: translateY(0) rotate(0); }
            100% { transform: translateY(100vh) rotate(720deg); }
        }
        #musicBtn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 9999;
            background: black;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 22px;
            cursor: pointer;
        }
        .nav-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 123, 255, 0.1);
        }
        .nav-ring a {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #007BFF;
            color: white;
            text-align: center;
            line-height: 60px;
            text-decoration: none;
            font-size: 16px;
        }
        .nav-ring a:nth-child(1) { transform: rotate(0deg) translate(150px) rotate(0deg); }
        .nav-ring a:nth-child(2) { transform: rotate(72deg) translate(150px) rotate(-72deg); }
        .nav-ring a:nth-child(3) { transform: rotate(144deg) translate(150px) rotate(-144deg); }
        .nav-ring a:nth-child(4) { transform: rotate(216deg) translate(150px) rotate(-216deg); }
        .nav-ring a:nth-child(5) { transform: rotate(288deg) translate(150px) rotate(-288deg); }
        .image {
            position: absolute;
            width: 60px;
            height: 60px;
            transition: transform 1s ease-in-out;
        }
        .image.sparkle {
            animation: sparkle 1s infinite;
        }
        .image.fall {
            animation: fall 1s forwards;
        }
        .image.exit {
            animation: exit 1s forwards;
        }
        .image-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%);
            animation: spin 10s linear infinite;
        }
        .image-container.fast {
            animation: spin-fast 2s linear infinite;
        }
        .confetti {
            width: 10px;
            height: 10px;
            background-color: yellow;
        }
        .confetti, .falling-image, .falling-text {
            position: absolute;
            animation: confetti 5s linear infinite;
            z-index: 1000; /* Ensure confetti, falling images, and falling text are above all other elements */
        }
        .falling-image {
            width: 40px;
            height: 40px;
        }
        .falling-text {
            font-size: 24px;
            color: yellow;
        }
        #intro {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 1s ease;
        }
        #intro h1 {
            color: white;
            font-size: 48px;
            font-family: sans-serif;
            letter-spacing: 6px;
            animation: fadeInText 1.5s ease forwards;
        }
        #intro p {
            color: #aaa;
            font-size: 18px;
            font-family: sans-serif;
            margin-top: 10px;
            animation: fadeInText 2s ease forwards;
        }
        #enterBtn {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 18px;
            background: transparent;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            letter-spacing: 3px;
            font-family: sans-serif;
            animation: fadeInText 2.5s ease forwards;
        }
        #enterBtn:hover {
            background: white;
            color: black;
        }
        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #confettiContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1000; /* Ensure confetti container is above all other elements */
        }
    </style>
</head>
<body>
    <div id="intro">
        <h1>BAHIA</h1>
        <p>bem vindo ao site</p>
        <button id="enterBtn" onclick="enterSite()">ENTRAR</button>
    </div>
    <audio id="bgMusic" loop>
        <source src="ReelAudio-48453_223233.mp3" type="audio/mpeg">
    </audio>
    <button id="musicBtn" onclick="toggleMusic()">🔇</button>
    <div class="nav-ring">
        <a href="#home" onclick="jumpToCauldron('images.jpg')">Home</a>
        <a href="#about" onclick="jumpToCauldron('original.jpg')">About</a>
        <a href="#services" onclick="jumpToCauldron('Shadow.jpg')">Services</a>
        <a href="#portfolio" onclick="jumpToCauldron('flops.jpg')">Portfolio</a>
        <a href="#contact" onclick="jumpToCauldron('tiririca.jpg')">Contact</a>
    </div>
    <button class="cauldron-button" onclick="speedUp()">Botão</button>
    <div class="image-container" id="imageContainer">
        <img src="images.jpg" alt="Imagem" class="image" id="image1">
        <img src="original.jpg" alt="Imagem" class="image" id="image2">
        <img src="Shadow.jpg" alt="Imagem" class="image" id="image3">
        <img src="flops.jpg" alt="Imagem" class="image" id="image4">
        <img src="tiririca.jpg" alt="Imagem" class="image" id="image5">
    </div>
    <div id="confettiContainer"></div>
    <script>
        function createConfetti() {
            const confettiContainer = document.getElementById('confettiContainer');
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = `${Math.random() * 100}vw`;
                confetti.style.animationDelay = `${Math.random() * 5}s`;
                confettiContainer.appendChild(confetti);
            }
        }

        function createFallingImages() {
            const confettiContainer = document.getElementById('confettiContainer');
            const images = ['images.jpg', 'original.jpg', 'Shadow.jpg', 'roblox.jpg', 'tiririca.jpg'];
            for (let i = 0; i < 20; i++) {
                const img = document.createElement('img');
                img.src = images[Math.floor(Math.random() * images.length)];
                img.className = 'falling-image';
                img.style.left = `${Math.random() * 100}vw`;
                img.style.animationDelay = `${Math.random() * 5}s`;
                confettiContainer.appendChild(img);
            }
        }

        function createFallingText() {
            const confettiContainer = document.getElementById('confettiContainer');
            const texts = ['Welcome', 'Hello', 'Puta', 'Bahia', 'TesãoS', 'Tiririca', 'Rue Rue', 'Siririca', 'Dedeu'];
            for (let i = 0; i < 10; i++) {
                const text = document.createElement('div');
                text.className = 'falling-text';
                text.textContent = texts[Math.floor(Math.random() * texts.length)];
                text.style.left = `${Math.random() * 100}vw`;
                text.style.animationDelay = `${Math.random() * 5}s`;
                confettiContainer.appendChild(text);
            }
        }

        function jumpToCauldron(imageSrc) {
            const image = document.createElement('img');
            image.src = imageSrc;
            image.className = 'image fall';
            const container = document.getElementById('imageContainer');
            container.appendChild(image);
            setTimeout(() => {
                image.className = 'image exit';
                setTimeout(() => {
                    image.remove();
                }, 1000);
            }, 1000);
        }

        function speedUp() {
            const container = document.getElementById('imageContainer');
            container.classList.add('fast');
            setTimeout(() => {
                container.classList.remove('fast');
            }, 2000);
        }

        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');

        function enterSite() {
            const intro = document.getElementById('intro');
            intro.style.opacity = '0';
            setTimeout(() => intro.style.display = 'none', 1000);
            music.play();
            btn.textContent = '🔊';
        }
        function toggleMusic() {
            if (music.paused) {
                music.play();
                btn.textContent = '🔊';
            } else {
                music.pause();
                btn.textContent = '🔇';
            }
        }

        // Function to refresh the page every 5 minutes (300,000 milliseconds)
        setTimeout(function() {
            location.reload();
        }, 300000); // 5 minutes

        // Create confetti, falling images, and falling text on page load
        window.onload = function() {
            createConfetti();
            createFallingImages();
            createFallingText();
        };
    </script>
</body>
</html>
